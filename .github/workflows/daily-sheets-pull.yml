name: Daily Sheets Pull

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  pull-submissions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Fetch submissions from Google Sheets
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        run: cd scripts && node fetch-sheets.js

      - name: Merge new submissions into data
        run: cd scripts && node merge-data.js

      - name: Generate updated business pages
        run: cd scripts && node generate-pages.js

      - name: Commit and push if changes found
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ businesses/ sitemap.xml
          git diff --staged --quiet || git commit -m "chore: new business submission added [skip ci]"
          git push
