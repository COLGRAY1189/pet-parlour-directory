name: Update Google Reviews

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest Google reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_REFERER: ${{ secrets.GOOGLE_REFERER }}
        run: |
          node scripts/fetch_reviews.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update Google reviews [skip ci]"
          git push
