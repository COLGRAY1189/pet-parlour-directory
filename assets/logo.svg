<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="logo-title">
  <title id="logo-title">The Parlour Logo</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2B1E"/>
      <stop offset="100%" stop-color="#2D4A30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4622D"/>
      <stop offset="100%" stop-color="#B8954A"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#B8954A" stroke-width="0.4" opacity="0.25"/>
  <!-- Minimal cat silhouette with pointed ears -->
  <g fill="#F4ECD8">
    <!-- Left ear -->
    <path d="M22,28 L19,16 L27,24Z"/>
    <!-- Right ear -->
    <path d="M42,28 L45,16 L37,24Z"/>
    <!-- Head -->
    <circle cx="32" cy="32" r="11"/>
    <!-- Left ear tip accent -->
    <path d="M22,28 L20.5,19 L25,25Z" fill="url(#accent)"/>
    <!-- Right ear tip accent -->
    <path d="M42,28 L43.5,19 L39,25Z" fill="url(#accent)"/>
  </g>
  <!-- Face features -->
  <g>
    <!-- Eyes -->
    <ellipse cx="27.5" cy="30.5" rx="2" ry="2.2" fill="#1C2B1E"/>
    <ellipse cx="36.5" cy="30.5" rx="2" ry="2.2" fill="#1C2B1E"/>
    <circle cx="28.2" cy="29.8" r="0.7" fill="#F4ECD8"/>
    <circle cx="37.2" cy="29.8" r="0.7" fill="#F4ECD8"/>
    <!-- Nose -->
    <path d="M32,34 L30,36.5 L34,36.5Z" fill="url(#accent)"/>
    <!-- Whiskers -->
    <g stroke="#1C2B1E" stroke-width="0.5" stroke-linecap="round" opacity="0.4">
      <line x1="22" y1="34" x2="28" y2="35"/>
      <line x1="22" y1="36.5" x2="28" y2="36"/>
      <line x1="36" y1="35" x2="42" y2="34"/>
      <line x1="36" y1="36" x2="42" y2="36.5"/>
    </g>
  </g>
  <!-- Collar -->
  <path d="M24,41 Q32,45 40,41" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="43.5" r="1.5" fill="url(#accent)"/>
</svg>